services:
  postgres:
    image: postgres:16-alpine
    container_name: status-meteorologia-db
    environment:
      POSTGRES_USER: status_user
      POSTGRES_PASSWORD: status_pass
      POSTGRES_DB: status_meteorologia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
